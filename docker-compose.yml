services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=n8n_admin
      - POSTGRES_PASSWORD=senha_secreta_petshop
      - POSTGRES_DB=petshop_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - petshop_network

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_storage:/home/node/.n8n
    depends_on:
      - postgres
    networks:
      - petshop_network

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.0
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - API_VERSION=v2
      - CONFIG_SESSION_PHONE_CLIENT=PetShop_Agent
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=chave_mestra_segura
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://n8n_admin:senha_secreta_petshop@postgres:5432/petshop_db?sslmode=disable
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - postgres
    networks:
      - petshop_network

volumes:
  n8n_storage:
  postgres_data:
  evolution_instances:

networks:
  petshop_network:
    driver: bridge
